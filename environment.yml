name: Mobibox_backend
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
    # FastAPI core
    - fastapi
    - uvicorn[standard]

    # Data validation and serialization
    - pydantic
    - pydantic-settings

    # Database
    - sqlalchemy
    - alembic
    - asyncpg  # PostgreSQL async driver
    - psycopg2-binary  # PostgreSQL sync driver
    - aiomysql  # MySQL async driver
    - aiosqlite  # SQLite async driver

    # Supabase
    - supabase

    # Authentication & Security
    - python-jose[cryptography]  # JWT tokens
    - passlib[bcrypt]  # Password hashing
    - python-multipart  # Form data parsing

    # HTTP client
    - httpx
    - aiohttp

    # Testing
    - pytest
    - pytest-asyncio
    - pytest-mock
    - httpx  # For testing FastAPI

    # Utilities
    - python-dotenv
    - pyyaml
    - orjson  # Fast JSON serialization

    # LLM Integration
    - langchain-openai
    - langchain-core
    - langchain-text-splitters

    # Development tools
    - black
    - isort
    - flake8
    - mypy

    # Celery
    - celery
    - aio-pika